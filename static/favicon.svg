<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#002FA7"/>
      <stop offset="100%" style="stop-color:#4f7dff"/>
    </linearGradient>
  </defs>
  <!-- TV body -->
  <rect x="15" y="12" width="70" height="56" rx="14" fill="url(#g)"/>
  <!-- Inner screen -->
  <rect x="19" y="16" width="62" height="48" rx="10" fill="#fff" opacity="0.15"/>
  <!-- Play triangle (bilibili style) -->
  <polygon points="70,28 70,52 86,40" fill="#fff"/>
  <!-- Stand -->
  <rect x="33" y="74" width="34" height="8" rx="4" fill="url(#g)"/>
  <!-- Base -->
  <rect x="28" y="85" width="44" height="6" rx="3" fill="url(#g)" opacity="0.6"/>
  <!-- Antenna dot -->
  <circle cx="24" cy="26" r="3" fill="#fff"/>
  <!-- Sound waves -->
  <circle cx="40" cy="26" r="18" fill="none" stroke="#fff" stroke-width="2.5"/>
  <line x1="40" y1="14" x2="40" y2="18" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
</svg>
